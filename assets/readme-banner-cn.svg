<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">英语学习教练 Skill</title>
  <desc id="desc">英语学习教练 Codex Skill 的专业横幅。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1720"/>
      <stop offset="0.48" stop-color="#15313f"/>
      <stop offset="1" stop-color="#0f8f83"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="0" fill="url(#bg)"/>
  <circle cx="1048" cy="68" r="110" fill="#e8b448" opacity="0.22"/>
  <circle cx="104" cy="302" r="92" fill="#88d4ff" opacity="0.18"/>
  <g filter="url(#shadow)">
    <rect x="78" y="62" width="1044" height="236" rx="22" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
  </g>
  <text x="600" y="128" text-anchor="middle" fill="#ffffff" font-family="'Microsoft YaHei', 'Noto Sans CJK SC', SimHei, Arial, sans-serif" font-size="52" font-weight="700">英语学习教练 Skill</text>
  <text x="600" y="172" text-anchor="middle" fill="#dbeafe" font-family="'Microsoft YaHei', 'Noto Sans CJK SC', SimHei, Arial, sans-serif" font-size="23" font-weight="600">面向英语练习、雅思备考、HTML 练习页、TTS 和学习记录的自适应 Codex Skill</text>
  <g font-family="'Microsoft YaHei', 'Noto Sans CJK SC', SimHei, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="246" y="214" width="92" height="30" rx="15" fill="#0f8f83"/>
    <text x="292" y="234" text-anchor="middle" fill="#ffffff">雅思</text>
