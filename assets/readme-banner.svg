<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">English Learning Coach Skill</title>
  <desc id="desc">A professional banner for the English Learning Coach Codex Skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1720"/>
      <stop offset="0.48" stop-color="#15313f"/>
      <stop offset="1" stop-color="#0f8f83"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="0" fill="url(#bg)"/>
  <circle cx="1048" cy="68" r="110" fill="#e8b448" opacity="0.22"/>
  <circle cx="104" cy="302" r="92" fill="#88d4ff" opacity="0.18"/>
  <g filter="url(#shadow)">
    <rect x="78" y="62" width="1044" height="236" rx="22" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
  </g>
  <text x="600" y="128" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">English Learning Coach</text>
  <text x="600" y="172" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">Adaptive Codex Skill for English practice, IELTS, HTML lessons, TTS, and learning records</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="258" y="214" width="92" height="30" rx="15" fill="#0f8f83"/>
    <text x="304" y="234" text-anchor="middle" fill="#ffffff">IELTS</text>
    <rect x="366" y="214" width="116" height="30" rx="15" fill="#1d5fd1"/>
    <text x="424" y="234" text-anchor="middle" fill="#ffffff">HTML Pages</text>
    <rect x="498" y="214" width="76" height="30" rx="15" fill="#e8b448"/>
    <text x="536" y="234" text-anchor="middle" fill="#17212b">TTS</text>
    <rect x="590" y="214" width="132" height="30" rx="15" fill="#e85d4f"/>
    <text x="656" y="234" text-anchor="middle" fill="#ffffff">Role Play</text>
    <rect x="738" y="214" width="204" height="30" rx="15" fill="#ffffff" opacity="0.9"/>
    <text x="840" y="234" text-anchor="middle" fill="#17212b">Learning Records</text>
  </g>
</svg>
